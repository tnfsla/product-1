<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAWSCAN — 도면 OCR 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───── LOGIN VIEW ───── -->
  <div id="login-view">
    <div class="bp-grid"></div>
    <div class="login-wrap">
      <div class="login-side-info">
        <div class="brand-mark">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
            <rect x="2" y="2" width="36" height="36" rx="3" stroke="#00C2FF" stroke-width="1.5"/>
            <path d="M8 20 H32 M20 8 V32" stroke="#00C2FF" stroke-width="1" stroke-dasharray="2 3"/>
            <rect x="12" y="12" width="16" height="16" fill="none" stroke="#00C2FF" stroke-width="1.5"/>
            <rect x="16" y="16" width="8" height="8" fill="#00C2FF" opacity="0.6"/>
          </svg>
          <span class="brand-name">DRAWSCAN</span>
        </div>
        <div class="side-copy">
          <h1>도면에서<br/><em>데이터로.</em></h1>
          <p>엔지니어링 도면을 업로드하면<br/>자동으로 구조화된 데이터로 변환됩니다.</p>
        </div>
        <div class="side-stats">
          <div class="stat">
            <span class="stat-num">99.2%</span>
            <span class="stat-label">파싱 정확도</span>
          </div>
          <div class="stat-div"></div>
          <div class="stat">
            <span class="stat-num">DWG·PDF·PNG</span>
            <span class="stat-label">지원 포맷</span>
          </div>
        </div>
      </div>

      <div class="login-panel">
        <div class="panel-header">
          <span class="panel-tag">SYSTEM ACCESS</span>
          <h2>로그인</h2>
        </div>
        <form id="loginForm" autocomplete="off">
          <div class="field-group">
            <label for="username">사용자 ID</label>
            <div class="input-wrap">
              <input type="text" id="username" name="username" placeholder="ID" required autocomplete="off"/>
              <span class="input-line"></span>
            </div>
          </div>
          <div class="field-group">
            <label for="password">비밀번호</label>
            <div class="input-wrap">
              <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="off"/>
              <span class="input-line"></span>
            </div>
          </div>
          <p id="login-error" class="login-error"></p>
          <button type="submit" id="login-btn">
            <span class="btn-text">접속하기</span>
            <span class="btn-arrow">→</span>
            <span class="btn-loader" hidden>
              <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg>
            </span>
          </button>
        </form>
        <div class="panel-footer">
          <span class="mono">v1.0.0</span>
          <span class="mono">© 2026 DRAWSCAN</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ───── DASHBOARD VIEW ───── -->
  <div id="dashboard-view" hidden>
    <nav class="topnav">
      <div class="nav-brand">
        <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
          <rect x="2" y="2" width="36" height="36" rx="3" stroke="#00C2FF" stroke-width="1.5"/>
          <path d="M8 20 H32 M20 8 V32" stroke="#00C2FF" stroke-width="1" stroke-dasharray="2 3"/>
          <rect x="12" y="12" width="16" height="16" fill="none" stroke="#00C2FF" stroke-width="1.5"/>
          <rect x="16" y="16" width="8" height="8" fill="#00C2FF" opacity="0.6"/>
        </svg>
        <span>DRAWSCAN</span>
      </div>
      <div class="nav-center">
        <span class="nav-tag">도면 분석 시스템</span>
      </div>
      <div class="nav-right">
        <span class="nav-user" id="nav-username">—</span>
        <button class="btn-logout" id="logoutBtn">로그아웃</button>
      </div>
    </nav>

    <main class="dash-main">
      <!-- LEFT: UPLOAD + FILE LIST -->
      <section class="panel panel-upload">
        <div class="panel-title">
          <span class="dot"></span>파일 업로드
        </div>

        <div class="dropzone" id="dropzone">
          <div class="dz-inner">
            <div class="dz-icon">
              <svg viewBox="0 0 64 64" fill="none" width="48" height="48">
                <rect x="4" y="8" width="40" height="52" rx="3" stroke="#00C2FF" stroke-width="1.5"/>
                <path d="M44 8 L60 24 L44 24 Z" stroke="#00C2FF" stroke-width="1.5" fill="none"/>
                <path d="M44 8 L44 24 L60 24" stroke="#00C2FF" stroke-width="1.5"/>
                <path d="M14 34 H34 M14 40 H28 M14 46 H32" stroke="#00C2FF" stroke-width="1" opacity="0.5"/>
                <circle cx="50" cy="46" r="10" fill="#0A1628" stroke="#00C2FF" stroke-width="1.5"/>
                <path d="M50 41 V51 M45 46 H55" stroke="#00C2FF" stroke-width="1.5"/>
              </svg>
            </div>
            <p class="dz-main">파일을 드래그하거나 클릭하세요</p>
            <p class="dz-sub">PDF · DWG · PNG · JPG — 최대 50MB</p>
            <button class="btn-select" type="button" id="selectFileBtn">파일 선택</button>
          </div>
          <input type="file" id="fileInput" accept=".pdf,.dwg,.png,.jpg,.jpeg" multiple hidden/>
        </div>

        <div class="file-list">
          <div class="file-list-header">
            <span>업로드된 파일</span>
            <span id="file-count" class="mono">0개</span>
          </div>
          <div id="file-items"></div>
        </div>

        <button class="btn-parse" id="parseBtn" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          파싱 시작
        </button>
      </section>

      <!-- RIGHT: RESULT TABLE -->
      <section class="panel panel-result">
        <div class="panel-title">
          <span class="dot dot-amber"></span>파싱 결과
          <span class="result-badge" id="result-badge" hidden>완료</span>
        </div>

        <div class="result-empty" id="result-empty">
          <div class="empty-icon">
            <svg viewBox="0 0 64 64" fill="none" width="56" height="56">
              <rect x="8" y="8" width="48" height="48" rx="4" stroke="#2A3F5F" stroke-width="1.5" stroke-dasharray="4 4"/>
              <path d="M20 32 H44 M20 24 H44 M20 40 H36" stroke="#2A3F5F" stroke-width="1.5"/>
            </svg>
          </div>
          <p>파일을 업로드하고<br/>파싱을 시작하세요</p>
        </div>

        <div id="result-content" hidden>
          <div class="result-meta" id="result-meta"></div>
          <div class="table-wrap">
            <table class="result-table">
              <thead id="result-thead"></thead>
              <tbody id="result-tbody"></tbody>
            </table>
          </div>
          <div class="result-actions">
            <button class="btn-export">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              CSV 내보내기
            </button>
            <button class="btn-save-db">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="currentColor" stroke-width="1.5"/>
                <polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="1.5"/>
                <polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              DB 저장
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
